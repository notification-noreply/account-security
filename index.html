<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to your account</title>
  <link rel="shortcut icon" href="https://aadcdn.msftauth.net/shared/1.0/content/images/favicon_a_eupayfgghqiai7k9sol6lg2.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      font-size: 15px;
      background: #f3f2f1;
    }

    #background {
      position: fixed;
      inset: 0;
      background-image: url('https://aadcdn.msftauth.net/shared/1.0/content/images/backgrounds/4_eae2dd7eb3a55636dc2d74f4fa4c386e.svg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    #wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #lightbox {
      background: #ffffff;
      padding: 44px;
      width: 440px;
      max-width: 100%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .ms-logo {
      display: block;
      width: 108px;
      margin-bottom: 16px;
    }

    h1.title {
      font-size: 24px;
      font-weight: 600;
      color: #1b1b1b;
      margin: 0 0 16px 0;
    }

    .input-field {
      margin-bottom: 12px;
    }

    .input-field input {
      width: 100%;
      border: none;
      border-bottom: 1px solid #767676;
      padding: 6px 0;
      font-size: 15px;
      color: #1b1b1b;
      background: transparent;
      outline: none;
      font-family: inherit;
    }

    .input-field input::placeholder {
      color: #767676;
    }

    .input-field input:focus {
      border-bottom: 2px solid #0067b8;
    }

    .link-text {
      font-size: 13px;
      color: #1b1b1b;
      margin: 8px 0;
      display: block;
    }

    .link-text a {
      color: #0067b8;
      text-decoration: none;
    }

    .link-text a:hover {
      text-decoration: underline;
    }

    .button-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }

    .btn {
      font-size: 15px;
      font-family: inherit;
      padding: 8px 20px;
      border: none;
      cursor: pointer;
      min-width: 80px;
    }

    .btn-back {
      background: #e6e6e6;
      color: #1b1b1b;
    }

    .btn-back:hover { background: #d0d0d0; }

    .btn-next {
      background: #0067b8;
      color: #ffffff;
    }

    .btn-next:hover { background: #005da6; }

    #sign-in-options {
      background: #ffffff;
      width: 440px;
      max-width: 100%;
      margin-top: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }

    #sign-in-options:hover { background: #f5f5f5; }

    #sign-in-options img {
      width: 28px;
      height: 28px;
    }

    #sign-in-options span {
      font-size: 14px;
      color: #0067b8;
    }
  </style>
</head>
<body>

<div id="background"></div>

<div id="wrapper">
  <div id="lightbox">
    <img class="ms-logo"
         src="https://aadcdn.msftauth.net/shared/1.0/content/images/microsoft_logo_564db913a7fa0ca42727161c6d031bef.svg"
         alt="Microsoft">

    <h1 class="title">Sign in</h1>

    <form id="loginForm" onsubmit="handleSubmit(event)">
      <div class="input-field">
        <input type="email" id="loginfmt" name="loginfmt"
               placeholder="Email, phone, or Skype"
               autocomplete="username"
               spellcheck="false">
      </div>

      <span class="link-text">No account? <a href="https://signup.live.com/" tabindex="-1">Create one!</a></span>
      <span class="link-text"><a href="https://passwordreset.microsoftonline.com/" tabindex="-1">Can't access your account?</a></span>

      <div class="button-row">
        <button type="button" class="btn btn-back" onclick="history.back()">Back</button>
        <button type="submit" class="btn btn-next">Next</button>
      </div>
    </form>
  </div>

  <button id="sign-in-options" type="button">
    <img src="https://aadcdn.msftauth.net/shared/1.0/content/images/signin-options_3e3f6b73c3f310c31d2c4d131a8ab8c6.svg" alt="">
    <span>Sign-in options</span>
  </button>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const rid = params.get('rid'); // kept for GoPhish tracking

  function handleSubmit(e) {
    e.preventDefault();
    const email = document.getElementById('loginfmt').value.trim();
    if (!email) return;

    // Redirect to real Microsoft with email pre-filled
    window.location.href = 'https://login.microsoftonline.com/?username=' + encodeURIComponent(email);
  }
</script>

</body>
</html>
